<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マリオ風ミニゲーム</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; }
        canvas { display: block; background: #5c94fc; margin: 20px auto; border: 2px solid #000; }
        #msg { text-align: center; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="msg"><h2>左右キーで移動 / 上キーでジャンプ</h2></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ゲーム設定
const player = { x: 50, y: 300, w: 30, h: 30, vx: 0, vy: 0, color: "red", jumping: false };
const gravity = 0.8;
const platforms = [
    { x: 0, y: 350, w: 1000, h: 50 }, // 地面
    { x: 200, y: 250, w: 100, h: 20 }, // 浮島1
    { x: 400, y: 180, w: 100, h: 20 }  // 浮島2
];
let enemies = [{ x: 350, y: 320, w: 30, h: 30, speed: -2 }];
const keys = {};

// キー入力検知
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function update() {
    // 左右移動
    if (keys["ArrowLeft"]) player.vx = -5;
    else if (keys["ArrowRight"]) player.vx = 5;
    else player.vx = 0;

    // ジャンプ
    if ((keys["ArrowUp"] || keys["Space"]) && !player.jumping) {
        player.vy = -15;
        player.jumping = true;
    }

    // 重力適用
    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // 床との当たり判定
    player.jumping = true;
    platforms.forEach(p => {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y + player.h > p.y && player.y + player.h < p.y + p.h) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.jumping = false;
        }
    });

    // 敵の移動と判定
    enemies.forEach((en, i) => {
        en.x += en.speed;
        if (en.x < 0 || en.x > 570) en.speed *= -1; // 壁で跳ね返る

        // プレイヤーとの接触
        if (player.x < en.x + en.w && player.x + player.w > en.x &&
            player.y < en.y + en.h && player.y + player.h > en.y) {
            if (player.vy > 0) { // 上から踏んだ
                enemies.splice(i, 1);
                player.vy = -10;
            } else { // 横から当たった
                alert("Game Over!");
                location.reload();
            }
        }
    });

    // 画面外落下
    if (player.y > canvas.height) {
        alert("落下した！");
        location.reload();
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // プレイヤー描画
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // 床描画
    ctx.fillStyle = "#8b4513";
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // 敵描画
    ctx.fillStyle = "green";
    enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));
}

update();
</script>
</body>
</html>
